<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vega - Premium Entertainment</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-content">
            <!-- LOGO -->
            <div class="logo" onclick="window.location.reload()">
                <i data-lucide="zap"></i>
                <span class="logo-text">VEGA</span>
            </div>

            <!-- NAV LINKS -->
            <nav class="nav-links">
                <a href="#" class="nav-link active" onclick="loadHome()">Home</a>
                <a href="#" class="nav-link" onclick="loadMovies()">Movies</a>
                <a href="#" class="nav-link" onclick="loadSeries()">Series</a>
            </nav>

            <!-- SEARCH & PROVIDERS -->
            <div class="nav-actions">
                <div class="search-wrapper">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') search()">
                </div>
                
                <select id="providerSelect" class="provider-dropdown"></select>

                <div id="statusIndicator" class="status">
                    <span id="statusDot">●</span>
                    <span id="statusText">Online</span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-container">
        
        <!-- GENRE / CATALOG BAR -->
        <div id="catalogContainer" class="catalog-bar"></div>

        <!-- CONTENT GRID -->
        <section id="contentGrid" class="content-grid">
            <div class="loader">
                <div class="spinner"></div>
                <p>Browsing the cosmos for content...</p>
            </div>
        </section>

    </main>

    <!-- DETAIL MODAL -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-container">
            <!-- Close -->
            <button class="close-modal" onclick="closeModal()">
                <i data-lucide="x"></i>
            </button>

            <div class="modal-body">
                <!-- Backdrop Image -->
                <div id="modalBackdrop" class="modal-backdrop"></div>
                
                <div class="modal-content-layout">
                    <!-- LEFT: POSTER & INFO -->
                    <div class="detail-sidebar">
                        <div class="poster-container">
                            <img id="detailPoster" class="detail-poster" src="" alt="">
                            <div id="detailRating" class="rating-badge"></div>
                        </div>
                        
                        <div class="meta-info">
                            <h2 id="detailTitle"></h2>
                            <div class="meta-tags">
                                <span id="detailYear"></span>
                                <span id="detailType" class="type-tag"></span>
                                <span id="detailProvider" class="provider-info"></span>
                            </div>
                            <p id="detailSynopsis" class="synopsis"></p>
                        </div>
                    </div>

                    <!-- RIGHT: PLAYER & EPISODES -->
                    <div class="detail-main">
                        <!-- PLAYER AREA -->
                        <div id="playerArea" class="player-wrapper" style="display:none;">
                            <video id="vjs-player"
                                class="video-js vjs-big-play-centered vjs-theme-city"
                                controls
                                preload="auto"
                                width="100%"
                                height="100%">
                            </video>
                        </div>

                        <!-- LINKS / EPISODES AREA -->
                        <div class="episodes-section">
                            <h3 id="episodesTitle">Available Streams</h3>
                            <div id="linksContainer" class="links-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- APP SCRIPT -->
    <script src="app.js"></script>

    <script>
        // UI Helpers
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
            if (window.player) {
                window.player.pause();
                document.getElementById('playerArea').style.display = 'none';
            }
        }

        // Placeholder for Home/Movies/Series
        function loadHome() { fetchData(""); updateActiveNav(0); }
        function loadMovies() { fetchData("movie"); updateActiveNav(1); }
        function loadSeries() { fetchData("tv"); updateActiveNav(2); }

        function updateActiveNav(index) {
            const links = document.querySelectorAll('.nav-link');
            links.forEach((l, i) => i === index ? l.classList.add('active') : l.classList.remove('active'));
        }
    </script>

</body>
</html>
