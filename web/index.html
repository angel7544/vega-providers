<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbix Play - Premium Entertainment</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i data-lucide="zap"></i>
            <span class="logo-text">Orbix Play</span>
        </div>

        <nav class="nav-links">
            <li class="nav-item active" onclick="loadCatalog()">
                <i data-lucide="home"></i>
                <span class="nav-text">Home</span>
            </li>

            <li class="nav-item">
                <i data-lucide="settings"></i>
                <span class="nav-text">Settings</span>
            </li>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-container" id="main">

        <!-- HEADER -->
        <header class="header">

            <!-- LEFT -->
            <div class="header-left">
                <button class="menu-btn" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>

                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput"
                        placeholder="Search movies, series..."
                        onkeydown="if(event.key==='Enter') search()">
                </div>
            </div>

            <!-- RIGHT -->
            <div class="header-right">

                <!-- PROVIDER SELECTOR (MOVED HERE) -->
                <select id="providerSelect" class="provider-dropdown"></select>

                <div id="statusIndicator" class="status">
                    <span>●</span> Online
                </div>

            </div>
        </header>

        <!-- CATALOG (NEW) -->
        <div id="catalogContainer" class="catalog-bar"></div>

        <!-- CONTENT -->
        <section id="contentGrid" class="content-grid"></section>

    </main>

    <!-- MODAL -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">

            <div class="close-btn" onclick="closeModal()">
                <i data-lucide="x"></i>
            </div>

            <div class="detail-left">
                <img id="detailPoster" class="detail-poster">
                <h2 id="detailTitle"></h2>
                <p id="detailSynopsis"></p>
            </div>

            <div class="detail-right">

                <div id="playerArea" class="player-container" style="display:none;"></div>

                <div id="linksContainer" class="links-container"></div>

            </div>

        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
