<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbix Play - Premium Entertainment</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i data-lucide="zap"></i>
            <span class="logo-text">Orbix Play</span>
        </div>

        <nav class="nav-links">
            <li class="nav-item active" onclick="loadCatalog()">
                <i data-lucide="home"></i>
                <span class="nav-text">Home</span>
            </li>

            <li class="nav-item">
                <i data-lucide="settings"></i>
                <span class="nav-text">Settings</span>
            </li>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-container" id="main">

        <!-- HEADER -->
        <header class="header">

            <!-- LEFT -->
            <div class="header-left">
                <button class="menu-btn" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>

                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput"
                        placeholder="Search movies, series..."
                        onkeydown="if(event.key==='Enter') search()">

                    <!-- 🔥 Search button -->
                    <button class="search-btn" onclick="search()">
                        <i data-lucide="arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="header-right">

                <!-- Provider Selector -->
                <select id="providerSelect" class="provider-dropdown"></select>

                <!-- Status -->
                <div id="statusIndicator" class="status">
                    <span id="statusDot">●</span>
                    <span id="statusText">Online</span>
                </div>

            </div>
        </header>

        <!-- Catalog -->
        <div id="catalogContainer" class="catalog-bar"></div>

        <!-- Content -->
        <section id="contentGrid" class="content-grid">
            <p class="empty-text">Start browsing or search something 🎬</p>
        </section>

    </main>

    <!-- MODAL -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">

            <!-- Close -->
            <div class="close-btn" onclick="closeModal()">
                <i data-lucide="x"></i>
            </div>

            <!-- LEFT -->
            <div class="detail-left">
                <img id="detailPoster" class="detail-poster">

                <h2 id="detailTitle"></h2>

                <!-- Provider tag -->
                <p id="detailProvider" class="provider-tag"></p>

                <p id="detailSynopsis"></p>
            </div>

            <!-- RIGHT -->
            <div class="detail-right">

                <!-- 🔥 FIXED PLAYER -->
                <div id="playerArea" class="player-container" style="display:none;">
                    <video id="vjs-player"
                        class="video-js vjs-big-play-centered vjs-theme-city"
                        controls
                        preload="auto"
                        width="100%"
                        height="100%">
                    </video>
                </div>

                <!-- Links -->
                <div id="linksContainer" class="links-container"></div>

            </div>

        </div>
    </div>

    <!-- APP SCRIPT -->
    <script src="app.js"></script>

    <!-- ========================= -->
    <!-- 🔥 SMALL REQUIRED SCRIPTS -->
    <!-- ========================= -->
    <script>
        // Sidebar toggle
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("collapsed");
        }

        // Close modal on outside click
        const modalOverlay = document.getElementById("modalOverlay");
        modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });
    </script>

</body>
</html>
